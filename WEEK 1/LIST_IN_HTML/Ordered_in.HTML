<!-- In the Ordered list show the number in the Web page
     but unordered_list show the bullets or circle to show the list. -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ordered lists</title>
</head>
<body>
    <h1>Ordered lits</h1>
    <div>

        Oreo cookie eating prrocedure:
        <ol>
            <li>Open box</li>
            <li>Take out cookies</li>
            <li>Make a Double Oreo
                <ol>
                    <li>Peel off the top part</li>
                    <li>Place another cookie in the middle</li>
                    <li>Put back the top part</li>
                </ol>
            </li>
            <li>Enjoy</li>
        </ol>
    </div>
</body>
</html>
